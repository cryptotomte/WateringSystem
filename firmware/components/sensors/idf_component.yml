# Managed dependencies of the sensors component, pinned exactly for
# reproducible builds (constitution III).
#
# esp-modbus is target-only: EspModbusClient.cpp is excluded from the linux
# host build (see CMakeLists.txt), so the dependency is rule-gated to keep
# esp-modbus out of the host-test dependency graph.
dependencies:
  idf: ">=6.0.0"
  espressif/esp-modbus:
    version: "==2.1.2"
    rules:
      - if: "target != linux"
